<rect width="680" height="520" fill="#1e1e1c"/><title style="fill:#c8c4bc;stroke:none;color:#d8d4cc;stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto">现实怎么来：历史一致性在中心运转</title><desc style="fill:#c8c4bc;stroke:none;color:#d8d4cc;stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto">根是无迹，在顶。正中心是历史一致性——那台不停运转的引擎，核对、照不裁。它一边转，一边撞到三种够不到的位置：横向·参考态、纵向·单侧、脚手架·D对齐；右边另一个方向是他者，够得到却不可对象化。撞到的，被缝成底部的现实。松手一条弧从现实绕回无迹，认出这一整套一致性是落脚出来的、可以松开重走。每个节点前半截对应第三章的名，后半截是它在跳转章节的数学本质。点任一节点跳到对应章节。</desc>

