<svg preserveAspectRatio="xMidYMid meet" width="100%" viewBox="0 0 780 700" role="img" xmlns="http://www.w3.org/2000/svg">
<!--svg-dark:v1-->
<rect x="0" y="0" width="780" height="700" fill="#1e1e1c"/>
<title>经典世界怎么被认出来（几何＝四层，①②③引擎撞的墙，④是墙外借来的）</title>
<desc>根是无迹，在顶。往下是"我"——坐上参照席、发动核对的活动。引擎是历史一致性：核对、照不裁。引擎运转时撞到三处够不到：横向·参考态、纵向·单侧，以及"脚手架·D"——脚手架不是一格，是一整条阶梯，引擎想要几何就撞上它。阶梯从粗到细：①点集（打桩落盘的地址，喂给引擎），②可测·可广播（哪些可指认、能广播——这层维数盲、看不见远近；且不是免费的：可广播押退相干选出独大账本、押7b），③拓扑·序（模流给"谁挨着谁、能逼近"，给序不给尺）。Borel 比拓扑粗、在下，拓扑更细在上（Borel 由拓扑遗忘开集而来）。①②③是自己够得着的墙面，都不欠态外位——引擎爬到③就到顶。④度量·D 在这道墙的外面、够不到：距离与维数的数值，要外接借来一把尺、付一次态外位；D 可去、非典范、充当非为真。③与④之间有一道间隙，④画成虚线、进出④的箭头都是虚的——前三层是自己搭的，第四层是赊来的。引擎缝出现实（压出来的岛），④再把借来的度量配给现实。现实的岛是真的，但海不因此变浅：造的是岛、不是大陆，搭得再高也不接近"真几何"。现实往下撞直觉·逻辑的边界；往右遭遇他者：都先当荷去压，当下分不清眼前这处是荷还是他者（结构性的，不是不够细心）——压得进账本的是荷（绕回现实、在流上），压不掉的是他者（留在缝里、不接账本）。他者逼出重奠。松手撤锚回无迹，借来的④第一个被交还。点任一节点跳到对应章节。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<text x="36" y="26" fill="#e8e4dc" font-family="'Anthropic Sans',sans-serif" font-size="17" font-weight="500">经典世界怎么被认出来</text>
<text x="744" y="14" text-anchor="end" fill="#b0aca0" font-family="'Anthropic Sans',sans-serif" font-size="13">实线＝自己的/在流上　虚线＝借来的·够不到的（压不动）</text>

